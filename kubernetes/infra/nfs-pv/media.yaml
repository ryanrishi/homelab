---
# Shared downloads PV (ReadWriteMany for all services)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-media-downloads-pv
spec:
  storageClassName: media-downloads
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: ${NFS_SERVER_IP}
    path: /volume1/k3s/media/downloads
  mountOptions:
    - nfsvers=4.1
    - hard
---
# TV media PV (ReadWriteMany for Sonarr)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-media-tv-pv
spec:
  storageClassName: media-tv
  capacity:
