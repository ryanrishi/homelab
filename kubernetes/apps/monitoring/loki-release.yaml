---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 8h
  timeout: 15m
  chart:
    spec:
      chart: loki
      version: "6.55.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      interval: 12h
  values:
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      storage:
        type: filesystem
      limits_config:
        retention_period: 168h
      compactor:
        retention_enabled: true
        delete_request_store: filesystem
      # Single-binary needs the ruler pointed at the local filesystem too
      rulerConfig:
        storage:
          type: local

    singleBinary:
      replicas: 1
      nodeSelector:
        lab.ryanrishi.com/longhorn-enabled: "true"
      priorityClassName: monitoring-stack
      persistence:
        enabled: true
        storageClass: longhorn-single
        size: 10Gi
      resources:
        requests:
          memory: 128Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m

    # Disable the scalable-mode components — SingleBinary only
    read:
      replicas: 0
    write:
      replicas: 0
    backend:
      replicas: 0
    # Avoid the default ~9Gi memcached caches
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false

    # Trim the chart's extras not needed for a homelab
    gateway:
      enabled: false
    monitoring:
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
      lokiCanary:
        enabled: false
    test:
      enabled: false
